[gmail]
# Your Gmail address
sender_email = your.email@gmail.com

# Gmail App Password (16-characters, no spaces needed)
app_password = 

# Your name as it should appear in the "From" field
sender_name = Your Full Name

# Path to your resume file (leave empty to skip attaching)
resume_path = 

# Path to your cover letter file (leave empty to skip attaching)
cover_letter_path = 

# Rate limiting: random delay between emails (seconds)
min_delay = 30
max_delay = 90

# Default job title to use if not specified in the Excel sheet
default_position = Software Engineer
